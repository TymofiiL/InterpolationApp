name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish
        run: dotnet publish -f net9.0-windows10.0.19041.0 -c Release -o publish\windows

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish\windows\* -DestinationPath InterpolationApp-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: InterpolationApp-windows.zip

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pin .NET 9 SDK
        run: echo '{"sdk":{"version":"9.0.0","rollForward":"latestMinor"}}' > global.json

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish arm64
        run: dotnet publish -f net9.0-maccatalyst -r maccatalyst-arm64 -c Release

      - name: Publish x64
        run: dotnet publish -f net9.0-maccatalyst -r maccatalyst-x64 -c Release

      - name: Create universal binary
        run: |
          ARM64=$(find bin -path "*arm64*" -name "InterpolationApp.app" -type d | head -1)
          X64=$(find bin -path "*x64*" -name "InterpolationApp.app" -type d | head -1)
          echo "arm64: $ARM64"
          echo "x64:   $X64"
          ditto "$ARM64" InterpolationApp.app
          lipo "$ARM64/Contents/MacOS/InterpolationApp" \
               "$X64/Contents/MacOS/InterpolationApp" \
               -create -output InterpolationApp.app/Contents/MacOS/InterpolationApp
          find "$ARM64" -name "*.dylib" | while read f; do
            rel="${f#$ARM64/}"
            x64f="$X64/$rel"
            [ -f "$x64f" ] && lipo "$f" "$x64f" -create -output "InterpolationApp.app/$rel"
          done

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent InterpolationApp.app InterpolationApp-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: InterpolationApp-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/InterpolationApp-windows.zip
            macos/InterpolationApp-macos.zip
