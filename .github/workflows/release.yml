name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish
        run: dotnet publish -f net9.0-windows10.0.19041.0 -c Release -o publish\windows

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish\windows\* -DestinationPath InterpolationApp-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: InterpolationApp-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish
        run: dotnet publish -f net9.0-maccatalyst -c Release

      - name: Zip .app bundle
        run: |
          APP=$(find bin -name "InterpolationApp.app" -type d | head -1)
          echo "Bundling: $APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" InterpolationApp-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: InterpolationApp-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/InterpolationApp-windows.zip
            macos/InterpolationApp-macos.zip
